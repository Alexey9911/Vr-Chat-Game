# fly.io config for the alonHouse WebSocket (TCP) relay. Deploy from this folder: `fly deploy`.
# No UDP / dedicated IPv4 / ICE needed — WebSockets ride the standard HTTP/TLS service and traverse any NAT.
app = "alonhouse-realtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# HTTP/HTTPS: health check + the WebSocket upgrade (same internal port). force_https + the tls handler mean the
# browser connects with wss://alonhouse-realtime.fly.dev and fly terminates TLS to the ws server on :8080.
[[services]]
  protocol = "tcp"
  internal_port = 8080
  # Auto power-down when idle (no live connections) so a short launch doesn't keep billing,
  # and cold-start the single machine on the next player. min 0 = fully off when nobody's online.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [services.concurrency]
    type = "connections"
    hard_limit = 400
    soft_limit = 300

# One big lobby of 30-50 over WebSockets + the chat moderation poller. Keep exactly ONE machine — peer +
# moderation state is in-process: `fly scale count 1`. Do NOT scale to 2 (players would split across relays).
# Sized up for a short high-traffic launch (auto-stops when idle, so the bigger VM only bills while in use).
[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
