# fly.io config for the alonHouse WebSocket (TCP) relay. Deploy from this folder: `fly deploy`.
# No UDP / dedicated IPv4 / ICE needed — WebSockets ride the standard HTTP/TLS service and traverse any NAT.
app = "alonhouse-realtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# HTTP/HTTPS: health check + the WebSocket upgrade (same internal port). force_https + the tls handler mean the
# browser connects with wss://alonhouse-realtime.fly.dev and fly terminates TLS to the ws server on :8080.
[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [services.concurrency]
    type = "connections"
    hard_limit = 400
    soft_limit = 300

# One big lobby of 30-50 over WebSockets is light (no per-peer DTLS/SCTP CPU like geckos). Keep exactly ONE
# machine — peer state is in-process: `fly scale count 1`. Do NOT scale to 2 (players would split across relays).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
